        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }

        .controles-busqueda {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
        }

        .caja-desplegable {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9em;
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }

        select {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            background-color: #fff;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: #0f4c81;
        }

        button.btn-buscar {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 22px;
            transition: background 0.3s;
        }

        button.btn-buscar:hover {
            background-color: #27ae60;
        }

        .partido-card {
            background: #fff;
            border-left: 5px solid #0f4c81;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);

        .partido-equipos {

            color: #2c3e50;
            margin-bottom: 5px;
        }

        .partido-detalles {
            font-size: 0.9em;
            color: #7f8c8d;
            line-height: 1.5;
        }

        .no-resultados {
            color: #e74c3c;
            text-align: center;
            font-weight: bold;
            padding: 20px;
            background: #fdf0ed;
            border-radius: 8px;
        }
    </style>
</head>
