<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda Mundial 2026</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: white; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        .seccion-busqueda { padding: 15px; background: #f9f9f9; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid #eee; }
        select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; }
        
        /* Estilos de ciudades */
        .seccion-ciudad { margin-top: 20px; padding: 10px; }
        .partido-card { padding: 8px; margin: 5px 0; background: #ffffff; font-size: 14px; border-bottom: 1px solid #eee; }
        
        /* Colores para los títulos */
        .titulo-cdmx { color: deeppink; }
        .titulo-gdl { color: green; }
        .titulo-mty { color: orange; }
    </style>
</head>
<body>
    <div class="container">
        <div class="seccion-busqueda">
            <h3>Consultar por Fecha</h3>
            <select id="selectMes"><option value="junio">Junio</option><option value="julio">Julio</option></select>
            <select id="selectDia"><script>for(let i=1; i<=31; i++) document.write(`<option value="${i}">${i}</option>`);</script></select>
            <button id="btnConsultar">Consultar Fecha</button>
            <div id="contenedorBusqueda" style="margin-top:10px;"></div>
        </div>

        <div id="contenedorCiudades">
            <div class="seccion-ciudad">
                <h2 class="titulo-cdmx">Ciudad de México</h2>
                <div id="listaCDMX"></div>
            </div>
            <div class="seccion-ciudad">
                <h2 class="titulo-gdl">Guadalajara</h2>
                <div id="listaGDL"></div>
            </div>
            <div class="seccion-ciudad">
                <h2 class="titulo-mty">Monterrey</h2>
                <div id="listaMTY"></div>
            </div>
        </div>
    </div>

    <script>
        const baseDeDatosPartidos = [
            { fecha: "11 de junio", local: "México", visitante: "Sudáfrica", estadio: "Estadio Ciudad de México", hora: "15:00" },
            { fecha: "11 de junio", local: "República de Corea", visitante: "República Checa", estadio: "Estadio Guadalajara", hora: "22:00" },
            { fecha: "14 de junio", local: "Suecia", visitante: "Túnez", estadio: "Estadio Monterrey", hora: "22:00" },
            { fecha: "17 de junio", local: "Uzbekistán", visitante: "Colombia", estadio: "Estadio Ciudad de México", hora: "22:00" },
            { fecha: "18 de junio", local: "México", visitante: "República de Corea", estadio: "Estadio Guadalajara", hora: "21:00" },
            { fecha: "20 de junio", local: "Túnez", visitante: "Japón", estadio: "Estadio Monterrey", hora: "00:00" },
            { fecha: "23 de junio", local: "Colombia", visitante: "RD Congo", estadio: "Estadio Guadalajara", hora: "22:00" },
            { fecha: "24 de junio", local: "República Checa", visitante: "México", estadio: "Estadio Ciudad de México", hora: "21:00" },
            { fecha: "24 de junio", local: "Sudáfrica", visitante: "República de Corea", estadio: "Estadio Monterrey", hora: "21:00" },
            { fecha: "26 de junio", local: "Uruguay", visitante: "España", estadio: "Estadio Guadalajara", hora: "20:00" },
            { fecha: "29 de junio", local: "Partido 75", visitante: "1º Grupo F vs 2º Grupo C", estadio: "Estadio Monterrey", hora: "Por definir" },
            { fecha: "30 de junio", local: "Partido 79", visitante: "1º Grupo A vs 3º Grupo C/E/F/H/I", estadio: "Estadio Ciudad de México", hora: "Por definir" },
            { fecha: "5 de julio", local: "Partido 92", visitante: "Ganador 79 vs Ganador 80", estadio: "Estadio Ciudad de México", hora: "Por definir" }
        ];

        // Lógica: Consultar Fecha
        document.getElementById('btnConsultar').addEventListener('click', function() {
            const fecha = document.getElementById('selectDia').value + " de " + document.getElementById('selectMes').value;
            const container = document.getElementById('contenedorBusqueda');
            container.innerHTML = "";
            const filtrados = baseDeDatosPartidos.filter(p => p.fecha === fecha);
            if(filtrados.length > 0){
                filtrados.forEach(p => {
                    container.innerHTML += `<div class="partido-card"><strong>${p.local} vs ${p.visitante}</strong><br>${p.estadio} ${p.hora}</div>`;
                });
            } else {
                container.innerHTML = "No hay partidos para esa fecha.";
            }
        });

        // Lógica: Cargar listas fijas automáticamente
        function cargarListasFijas() {
            const listCDMX = document.getElementById('listaCDMX');
            const listGDL = document.getElementById('listaGDL');
            const listMTY = document.getElementById('listaMTY');

            baseDeDatosPartidos.forEach(p => {
                const card = `<div class="partido-card"><strong>${p.fecha}</strong><br>${p.local} vs ${p.visitante} (${p.hora})</div>`;
                
                if (p.estadio.includes("Ciudad de México")) listCDMX.innerHTML += card;
                if (p.estadio.includes("Guadalajara")) listGDL.innerHTML += card;
                if (p.estadio.includes("Monterrey")) listMTY.innerHTML += card;
            });
        }

        window.onload = cargarListasFijas;
    </script>
</body>
</html>
