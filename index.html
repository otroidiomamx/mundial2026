<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda Mundial 2026</title>
    <style>
        body { font-family: sans-serif; padding: 0; background: white; margin: 0; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #btnConsultar { padding: 8px 15px; background: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .partido-card { border-left: 4px solid #0f4c81; padding: 8px; margin: 8px 0; background: #f9f9f9; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <select id="selectMes"><option value="junio">Junio</option><option value="julio">Julio</option></select>
        <select id="selectDia"><script>for(let i=1; i<=31; i++) document.write(`<option value="${i}">${i}</option>`);</script></select>
        <button id="btnConsultar">Consultar</button>
        <div id="contenedorResultados"></div>
    </div>

    <script>
        const baseDeDatosPartidos = [
            { fecha: "11 de junio", local: "México", visitante: "Sudáfrica", estadio: "Estadio Ciudad de México", hora: "15:00" },
            { fecha: "11 de junio", local: "República de Corea", visitante: "República Checa", estadio: "Estadio Guadalajara", hora: "22:00" },
            { fecha: "12 de junio", local: "Canadá", visitante: "Bosnia y Herzegovina", estadio: "Estadio Toronto", hora: "15:00" },
            { fecha: "12 de junio", local: "Estados Unidos", visitante: "Paraguay", estadio: "Estadio Los Ángeles", hora: "21:00" },
            { fecha: "13 de junio", local: "Catar", visitante: "Suiza", estadio: "Estadio Bahía de San Francisco", hora: "15:00" },
            { fecha: "13 de junio", local: "Brasil", visitante: "Marruecos", estadio: "Estadio Nueva York Nueva Jersey", hora: "18:00" },
            { fecha: "13 de junio", local: "Haití", visitante: "Escocia", estadio: "Estadio Boston", hora: "21:00" },
            { fecha: "13 de junio", local: "Australia", visitante: "Turquía", estadio: "Estadio BC Place Vancouver", hora: "00:00" },
            { fecha: "14 de junio", local: "Alemania", visitante: "Curazao", estadio: "Estadio Houston", hora: "13:00" },
            { fecha: "14 de junio", local: "Países Bajos", visitante: "Japón", estadio: "Estadio Dallas", hora: "16:00" },
            { fecha: "14 de junio", local: "Costa de Marfil", visitante: "Ecuador", estadio: "Estadio Filadelfia", hora: "19:00" },
            { fecha: "14 de junio", local: "Suecia", visitante: "Túnez", estadio: "Estadio Monterrey", hora: "22:00" },
            { fecha: "27 de junio", local: "Panamá", visitante: "Inglaterra", estadio: "Estadio Nueva York Nueva Jersey", hora: "17:00" },
            { fecha: "27 de junio", local: "Croacia", visitante: "Ghana", estadio: "Estadio Filadelfia", hora: "17:00" },
            { fecha: "27 de junio", local: "Colombia", visitante: "Portugal", estadio: "Estadio Miami", hora: "19:30" },
            { fecha: "27 de junio", local: "RD Congo", visitante: "Uzbekistán", estadio: "Estadio Atlanta", hora: "19:30" },
            { fecha: "27 de junio", local: "Argelia", visitante: "Austria", estadio: "Estadio Kansas City", hora: "22:00" },
            { fecha: "27 de junio", local: "Jordania", visitante: "Argentina", estadio: "Estadio Dallas", hora: "22:00" },
            { fecha: "19 de julio", local: "Final", visitante: "Gran Final", estadio: "MetLife Stadium", hora: "Por definir" }
        ];

        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById('btnConsultar').addEventListener('click', function() {
                const mes = document.getElementById('selectMes').value;
                const dia = document.getElementById('selectDia').value;
                const fechaBuscada = dia + " de " + mes;
                const contenedor = document.getElementById('contenedorResultados');
                
                contenedor.innerHTML = "";
                const filtrados = baseDeDatosPartidos.filter(p => p.fecha === fechaBuscada);
                
                if (filtrados.length > 0) {
                    filtrados.forEach(p => {
                        contenedor.innerHTML += `<div class="partido-card"><strong>${p.local} vs ${p.visitante}</strong><br>Sede: ${p.estadio}<br>Hora: ${p.hora}</div>`;
                    });
                } else {
                    contenedor.innerHTML = "No hay partidos para el " + fechaBuscada;
                }
            });
        });
    </script>
</body>
</html>
